<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#176b87" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Zeiterfassung" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <title>Zeiterfassung</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-soft: #eef2f6;
      --text: #17202a;
      --muted: #637083;
      --line: #d8dee8;
      --primary: #176b87;
      --primary-dark: #0f5269;
      --accent: #f2aa4c;
      --danger: #c62828;
      --danger-soft: #fff1f1;
      --success: #237a57;
      --shadow: 0 16px 42px rgba(23, 32, 42, 0.09);
      --radius: 8px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, #e8edf2 0, #f4f6f8 360px),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 3vw, 2.65rem);
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 410px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .form-panel {
      padding: 20px;
      position: sticky;
      top: 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    h2 {
      margin: 0;
      font-size: 1.08rem;
    }

    .today {
      color: var(--muted);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 650;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
      transition: border-color 0.16s, box-shadow 0.16s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.13);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .metric {
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: 1.12rem;
      line-height: 1.1;
    }

    .metric.netto.alert strong {
      color: var(--danger);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 9px 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      background: #fff;
      transition: transform 0.12s, background 0.12s, border-color 0.12s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-secondary {
      border-color: var(--line);
    }

    .btn-danger {
      border-color: #f0caca;
      color: var(--danger);
      background: var(--danger-soft);
    }

    .error {
      display: none;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--danger-soft);
      color: var(--danger);
      font-weight: 650;
      line-height: 1.35;
    }

    .error.visible {
      display: block;
    }

    .table-panel {
      overflow: hidden;
    }

    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .table-head p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 13px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    td {
      font-size: 0.94rem;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .netto-high {
      color: var(--danger);
      font-weight: 800;
    }

    .status-open {
      color: var(--primary);
      font-weight: 800;
    }

    .row-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .icon-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .empty {
      padding: 38px 18px;
      color: var(--muted);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: var(--radius);
      background: rgba(242, 170, 76, 0.18);
      color: #7a4b0f;
      font-weight: 800;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 680px);
        padding-top: 18px;
      }

      header,
      .table-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .form-panel {
        position: static;
      }
    }

    @media (max-width: 520px) {
      .field-grid,
      .summary {
        grid-template-columns: 1fr;
      }

      .actions,
      .toolbar {
        width: 100%;
      }

      .btn {
        flex: 1 1 150px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Zeiterfassung</h1>
        <p class="subtitle">Arbeitszeiten eintragen, Pausenabzug berechnen und als Excel-kompatible CSV exportieren.</p>
      </div>
      <div class="toolbar">
        <button class="btn btn-secondary" id="exportBtn" type="button" title="CSV herunterladen">Export CSV</button>
        <button class="btn btn-danger" id="clearBtn" type="button" title="Alle Einträge löschen">Alles löschen</button>
      </div>
    </header>

    <section class="layout">
      <section class="panel form-panel">
        <div class="panel-title">
          <h2 id="formTitle">Neuer Eintrag</h2>
          <span class="today" id="todayLabel"></span>
        </div>

        <form id="timeForm">
          <input id="entryId" type="hidden" />

          <div class="field">
            <label for="entryDate">Datum</label>
            <input id="entryDate" type="date" required />
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="kommt1">Kommt</label>
              <input id="kommt1" type="time" required />
            </div>
            <div class="field">
              <label for="geht1">Geht</label>
              <input id="geht1" type="time" />
            </div>
            <div class="field">
              <label for="kommt2">2. Kommt</label>
              <input id="kommt2" type="time" />
            </div>
            <div class="field">
              <label for="geht2">2. Geht</label>
              <input id="geht2" type="time" />
            </div>
          </div>

          <div class="summary" aria-live="polite">
            <div class="metric">
              <span>Gesamt</span>
              <strong id="grossPreview">0,00 h</strong>
            </div>
            <div class="metric">
              <span>Abgezogen</span>
              <strong id="deductionPreview">0,00 h</strong>
            </div>
            <div class="metric netto" id="netPreviewBox">
              <span>Netto</span>
              <strong id="netPreview">0,00 h</strong>
            </div>
          </div>

          <div class="error" id="errorBox"></div>

          <div class="actions">
            <button class="btn btn-primary" type="submit" id="saveBtn">Eintragen</button>
            <button class="btn btn-secondary" type="button" id="resetBtn">Zurücksetzen</button>
          </div>
        </form>
      </section>

      <section class="panel table-panel">
        <div class="table-head">
          <div>
            <h2>Einträge</h2>
            <p id="entryCount">Keine Einträge gespeichert</p>
          </div>
          <span class="badge" id="monthTotal">Monat: 0,00 h</span>
        </div>
        <div class="table-wrap" id="tableWrap"></div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "zeiterfassung.entries.v1";
    const formatter = new Intl.DateTimeFormat("de-DE", {
      weekday: "long",
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });

    const form = document.getElementById("timeForm");
    const fields = {
      id: document.getElementById("entryId"),
      date: document.getElementById("entryDate"),
      kommt1: document.getElementById("kommt1"),
      geht1: document.getElementById("geht1"),
      kommt2: document.getElementById("kommt2"),
      geht2: document.getElementById("geht2")
    };
    const grossPreview = document.getElementById("grossPreview");
    const deductionPreview = document.getElementById("deductionPreview");
    const netPreview = document.getElementById("netPreview");
    const netPreviewBox = document.getElementById("netPreviewBox");
    const errorBox = document.getElementById("errorBox");
    const tableWrap = document.getElementById("tableWrap");
    const entryCount = document.getElementById("entryCount");
    const monthTotal = document.getElementById("monthTotal");
    const formTitle = document.getElementById("formTitle");
    const saveBtn = document.getElementById("saveBtn");

    let entries = loadEntries();

    function toIsoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function isoToday() {
      return toIsoDate(new Date());
    }

    function createId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function parseTime(value) {
      if (!value) return null;
      const [hours, minutes] = value.split(":").map(Number);
      if (!Number.isInteger(hours) || !Number.isInteger(minutes) || hours > 23 || minutes > 59) {
        return null;
      }
      return hours * 60 + minutes;
    }

    function hoursBetween(start, end) {
      return Math.round(((end - start) / 60) * 100) / 100;
    }

    function round2(value) {
      return Math.round((value + Number.EPSILON) * 100) / 100;
    }

    function calculate(values) {
      const start1 = parseTime(values.kommt1);
      const end1 = parseTime(values.geht1);
      const start2 = parseTime(values.kommt2);
      const end2 = parseTime(values.geht2);

      if (start1 === null) {
        return { gross: 0, deduction: 0, net: 0, complete: false };
      }
      if (end1 === null) {
        if (values.kommt2 || values.geht2) {
          throw new Error("Der zweite Zeitblock kann erst berechnet werden, wenn die erste Geht-Zeit eingetragen ist.");
        }
        return { gross: 0, deduction: 0, net: 0, complete: false };
      }
      if (end1 <= start1) {
        throw new Error("Die erste Geht-Zeit muss nach der ersten Kommt-Zeit liegen.");
      }
      if ((values.kommt2 && !values.geht2) || (!values.kommt2 && values.geht2)) {
        throw new Error("Bitte den zweiten Zeitblock vollständig ausfüllen oder beide Felder leer lassen.");
      }
      if (values.kommt2 && values.geht2 && end2 <= start2) {
        throw new Error("Die zweite Geht-Zeit muss nach der zweiten Kommt-Zeit liegen.");
      }

      const attendance1 = hoursBetween(start1, end1);
      const attendance2 = values.kommt2 && values.geht2 ? hoursBetween(start2, end2) : 0;
      const gross = round2(attendance1 + attendance2);
      const deduction = gross > 6 ? 0.75 : 0;
      const net = round2(gross - deduction);

      return { gross, deduction, net, complete: true };
    }

    function collectValues() {
      return {
        date: fields.date.value,
        kommt1: fields.kommt1.value,
        geht1: fields.geht1.value,
        kommt2: fields.kommt2.value,
        geht2: fields.geht2.value
      };
    }

    function formatNumber(value) {
      return value.toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatDate(isoDate) {
      const [year, month, day] = isoDate.split("-").map(Number);
      return formatter.format(new Date(year, month - 1, day));
    }

    function isComplete(entry) {
      return entry.complete !== false;
    }

    function showError(message) {
      errorBox.textContent = message || "";
      errorBox.classList.toggle("visible", Boolean(message));
    }

    function updatePreview() {
      try {
        const result = calculate(collectValues());
        grossPreview.textContent = `${formatNumber(result.gross)} h`;
        deductionPreview.textContent = `${formatNumber(result.deduction)} h`;
        netPreview.textContent = `${formatNumber(result.net)} h`;
        netPreviewBox.classList.toggle("alert", result.net > 9.99);
        showError("");
      } catch (error) {
        grossPreview.textContent = "0,00 h";
        deductionPreview.textContent = "0,00 h";
        netPreview.textContent = "0,00 h";
        netPreviewBox.classList.remove("alert");
        showError(error.message);
      }
    }

    function loadEntries() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveEntries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function resetForm() {
      form.reset();
      fields.id.value = "";
      fields.date.value = isoToday();
      formTitle.textContent = "Neuer Eintrag";
      saveBtn.textContent = "Eintragen";
      showError("");
      updatePreview();
    }

    function render() {
      const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date) || b.createdAt.localeCompare(a.createdAt));
      entryCount.textContent = entries.length === 1 ? "1 Eintrag gespeichert" : `${entries.length} Einträge gespeichert`;

      const currentMonth = isoToday().slice(0, 7);
      const total = entries
        .filter((entry) => entry.date.startsWith(currentMonth))
        .reduce((sum, entry) => sum + entry.net, 0);
      monthTotal.textContent = `Monat: ${formatNumber(round2(total))} h`;

      if (!sorted.length) {
        tableWrap.innerHTML = '<div class="empty">Noch keine Zeiten eingetragen.</div>';
        return;
      }

      const rows = sorted.map((entry) => `
        <tr>
          <td>${formatDate(entry.date)}</td>
          <td>${entry.kommt1}</td>
          <td>${entry.geht1 || '<span class="status-open">offen</span>'}</td>
          <td>${entry.kommt2 || ""}</td>
          <td>${entry.geht2 || ""}</td>
          <td>${isComplete(entry) ? formatNumber(entry.gross) : ""}</td>
          <td>${isComplete(entry) ? formatNumber(entry.deduction) : ""}</td>
          <td class="${entry.net > 9.99 ? "netto-high" : ""}">${isComplete(entry) ? formatNumber(entry.net) : ""}</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" type="button" data-edit="${entry.id}" title="Eintrag bearbeiten">✎</button>
              <button class="icon-btn" type="button" data-delete="${entry.id}" title="Eintrag löschen">×</button>
            </div>
          </td>
        </tr>
      `).join("");

      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Datum</th>
              <th>Kommt</th>
              <th>Geht</th>
              <th>Kommt</th>
              <th>Geht</th>
              <th>Gesamt Anwesenheit</th>
              <th>Abgezogen</th>
              <th>Netto</th>
              <th>Aktion</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function editEntry(id) {
      const entry = entries.find((item) => item.id === id);
      if (!entry) return;
      fields.id.value = entry.id;
      fields.date.value = entry.date;
      fields.kommt1.value = entry.kommt1;
      fields.geht1.value = entry.geht1 || "";
      fields.kommt2.value = entry.kommt2 || "";
      fields.geht2.value = entry.geht2 || "";
      formTitle.textContent = "Eintrag bearbeiten";
      saveBtn.textContent = "Aktualisieren";
      updatePreview();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteEntry(id) {
      const entry = entries.find((item) => item.id === id);
      if (!entry) return;
      if (!confirm(`Eintrag vom ${formatDate(entry.date)} löschen?`)) return;
      entries = entries.filter((item) => item.id !== id);
      saveEntries();
      render();
      if (fields.id.value === id) resetForm();
    }

    function exportCsv() {
      if (!entries.length) {
        showError("Es gibt noch keine Einträge für den Export.");
        return;
      }

      const header = ["DATUM", "KOMMT", "GEHT", "KOMMT", "GEHT", "GESAMT ANWESENHEIT", "ABGEZOGEN", "NETTO"];
      const lines = entries
        .slice()
        .sort((a, b) => a.date.localeCompare(b.date))
        .map((entry) => [
          formatDate(entry.date),
          entry.kommt1,
          entry.geht1 || "",
          entry.kommt2 || "",
          entry.geht2 || "",
          isComplete(entry) ? formatNumber(entry.gross) : "",
          isComplete(entry) ? formatNumber(entry.deduction) : "",
          isComplete(entry) ? formatNumber(entry.net) : ""
        ]);

      const csv = [header, ...lines]
        .map((row) => row.map((value) => `"${String(value).replaceAll('"', '""')}"`).join(";"))
        .join("\r\n");

      const blob = new Blob(["\ufeff", csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `zeiterfassung-${isoToday()}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const values = collectValues();
      if (!values.date) {
        showError("Bitte ein Datum auswählen.");
        return;
      }

      try {
        const result = calculate(values);
        if (!values.kommt1) {
          showError("Bitte mindestens die erste Kommt-Zeit eintragen.");
          return;
        }

        const existingId = fields.id.value;
        const entry = {
          id: existingId || createId(),
          createdAt: existingId ? entries.find((item) => item.id === existingId)?.createdAt || new Date().toISOString() : new Date().toISOString(),
          ...values,
          gross: result.gross,
          deduction: result.deduction,
          net: result.net,
          complete: result.complete
        };

        if (existingId) {
          entries = entries.map((item) => item.id === existingId ? entry : item);
        } else {
          entries.push(entry);
        }

        saveEntries();
        render();
        resetForm();
      } catch (error) {
        showError(error.message);
      }
    });

    form.addEventListener("input", updatePreview);

    tableWrap.addEventListener("click", (event) => {
      const editId = event.target.dataset.edit;
      const deleteId = event.target.dataset.delete;
      if (editId) editEntry(editId);
      if (deleteId) deleteEntry(deleteId);
    });

    document.getElementById("resetBtn").addEventListener("click", resetForm);
    document.getElementById("exportBtn").addEventListener("click", exportCsv);
    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!entries.length) return;
      if (!confirm("Alle Zeiterfassungs-Einträge löschen?")) return;
      entries = [];
      saveEntries();
      render();
      resetForm();
    });

    document.getElementById("todayLabel").textContent = formatDate(isoToday());
    resetForm();
    render();
  </script>
</body>
</html>
